<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Evueo — AI Logistics Extractor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Mono:wght@400;500&family=Figtree:wght@400;500;600&display=swap"
      rel="stylesheet"
    />

    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #070c18;
        --surface: #0e1526;
        --border: #1e2d4a;
        --accent: #f5a623;
        --accent2: #e8870a;
        --text: #e8edf5;
        --muted: #6b7a99;
        --success: #22c55e;
        --error: #ef4444;
        --radius: 10px;
      }

      body {
        background: var(--bg);
        color: var(--text);
        font-family: "Figtree", sans-serif;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 32px 16px 60px;
      }

      /* ── Header ── */
      header {
        width: 100%;
        max-width: 680px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 36px;
      }

      .logo {
        font-family: "Syne", sans-serif;
        font-size: 1.75rem;
        font-weight: 800;
        letter-spacing: -0.5px;
        color: var(--text);
      }

      .logo span {
        color: var(--accent);
      }

      /* ── Status Pill ── */
      .status-pill {
        display: flex;
        align-items: center;
        gap: 7px;
        background: var(--surface);
        border: 1px solid var(--border);
        padding: 6px 14px;
        border-radius: 999px;
        font-family: "DM Mono", monospace;
        font-size: 0.72rem;
        color: var(--muted);
        letter-spacing: 0.03em;
      }

      .status-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--muted);
        flex-shrink: 0;
        transition: background 0.4s;
      }

      .status-dot.online {
        background: var(--success);
        box-shadow: 0 0 6px var(--success);
      }
      .status-dot.offline {
        background: var(--error);
        box-shadow: 0 0 6px var(--error);
      }

      /* ── Card ── */
      .card {
        width: 100%;
        max-width: 680px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 28px;
        margin-bottom: 20px;
      }

      .card-title {
        font-family: "Syne", sans-serif;
        font-size: 0.8rem;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--accent);
        margin-bottom: 8px;
      }

      .card-desc {
        font-size: 0.88rem;
        color: var(--muted);
        margin-bottom: 18px;
        line-height: 1.55;
      }

      /* ── Textarea ── */
      textarea {
        width: 100%;
        height: 160px;
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        color: var(--text);
        font-family: "DM Mono", monospace;
        font-size: 0.82rem;
        padding: 14px 16px;
        resize: vertical;
        outline: none;
        transition: border-color 0.2s;
        line-height: 1.6;
      }

      textarea::placeholder {
        color: var(--muted);
      }
      textarea:focus {
        border-color: var(--accent);
      }

      /* ── Button ── */
      .btn {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        background: var(--accent);
        color: #07090f;
        font-family: "Figtree", sans-serif;
        font-weight: 700;
        font-size: 0.9rem;
        border: none;
        padding: 11px 24px;
        border-radius: var(--radius);
        cursor: pointer;
        margin-top: 14px;
        transition:
          background 0.2s,
          transform 0.1s;
      }

      .btn:hover {
        background: var(--accent2);
      }
      .btn:active {
        transform: scale(0.98);
      }

      .btn.secondary {
        background: transparent;
        border: 1px solid var(--border);
        color: var(--text);
        font-weight: 600;
        padding: 10px 20px;
        margin-top: 0;
      }

      .btn.secondary:hover {
        border-color: var(--accent);
        color: var(--accent);
      }

      /* ── Search row ── */
      .search-row {
        display: flex;
        gap: 10px;
        align-items: center;
      }

      .search-row input {
        flex: 1;
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        color: var(--text);
        font-family: "Figtree", sans-serif;
        font-size: 0.88rem;
        padding: 10px 14px;
        outline: none;
        transition: border-color 0.2s;
      }

      .search-row input::placeholder {
        color: var(--muted);
      }
      .search-row input:focus {
        border-color: var(--accent);
      }

      /* ── Output ── */
      #output {
        margin-top: 20px;
        min-height: 60px;
      }

      .output-placeholder {
        font-family: "DM Mono", monospace;
        font-size: 0.8rem;
        color: var(--muted);
        text-align: center;
        padding: 24px 0;
      }

      /* ── Spinner ── */
      .spinner-wrap {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
        padding: 28px 0;
      }

      .spinner {
        width: 32px;
        height: 32px;
        border: 3px solid var(--border);
        border-top-color: var(--accent);
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .spinner-label {
        font-family: "DM Mono", monospace;
        font-size: 0.78rem;
        color: var(--muted);
      }

      /* ── Result Card ── */
      .result-success {
        border: 1px solid var(--border);
        border-left: 4px solid var(--success);
        border-radius: var(--radius);
        padding: 20px;
        animation: fadeUp 0.3s ease;
      }

      .result-error {
        border: 1px solid var(--border);
        border-left: 4px solid var(--error);
        border-radius: var(--radius);
        padding: 20px;
        font-family: "DM Mono", monospace;
        font-size: 0.8rem;
        color: var(--error);
      }

      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .result-badge {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        background: rgba(34, 197, 94, 0.1);
        color: var(--success);
        font-size: 0.75rem;
        font-weight: 600;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        padding: 4px 10px;
        border-radius: 999px;
        margin-bottom: 18px;
      }

      .field {
        margin-bottom: 14px;
      }

      .field:last-child {
        margin-bottom: 0;
      }

      .field-label {
        font-family: "DM Mono", monospace;
        font-size: 0.7rem;
        color: var(--muted);
        letter-spacing: 0.1em;
        text-transform: uppercase;
        margin-bottom: 4px;
      }

      .field-value {
        font-size: 0.92rem;
        color: var(--text);
        font-weight: 500;
        line-height: 1.5;
        word-break: break-word;
      }

      .tracking-chip {
        display: inline-block;
        background: rgba(245, 166, 35, 0.12);
        color: var(--accent);
        font-family: "DM Mono", monospace;
        font-size: 0.82rem;
        font-weight: 500;
        padding: 4px 10px;
        border-radius: 6px;
        border: 1px solid rgba(245, 166, 35, 0.2);
      }

      /* ── Search Results ── */
      .records-list {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .record-card {
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 14px 16px;
        animation: fadeUp 0.25s ease;
      }

      .record-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        margin-bottom: 8px;
        flex-wrap: wrap;
        gap: 6px;
      }

      .record-route {
        font-size: 0.9rem;
        font-weight: 600;
      }

      .record-route .arrow {
        color: var(--muted);
        margin: 0 6px;
      }

      .record-date {
        font-family: "DM Mono", monospace;
        font-size: 0.7rem;
        color: var(--muted);
      }

      .record-items {
        font-size: 0.82rem;
        color: var(--muted);
        margin-top: 4px;
        margin-bottom: 6px;
      }

      .record-tracking {
        font-family: "DM Mono", monospace;
        font-size: 0.72rem;
        color: var(--accent);
      }

      .no-results {
        text-align: center;
        font-family: "DM Mono", monospace;
        font-size: 0.8rem;
        color: var(--muted);
        padding: 24px 0;
      }

      /* ── Divider ── */
      .divider {
        border: none;
        border-top: 1px solid var(--border);
        margin: 24px 0;
      }

      /* ── Mobile ── */
      @media (max-width: 480px) {
        body {
          padding: 20px 12px 48px;
        }
        header {
          margin-bottom: 24px;
        }
        .logo {
          font-size: 1.45rem;
        }
        .card {
          padding: 20px 16px;
        }
        .search-row {
          flex-direction: column;
          align-items: stretch;
        }
        .btn.secondary {
          width: 100%;
          justify-content: center;
        }
      }
    </style>
  </head>
  <body>
    <!-- Header -->
    <header>
      <div class="logo">ev<span>u</span>eo</div>
      <div class="status-pill">
        <div class="status-dot" id="status-dot"></div>
        <span id="status-text">Connecting...</span>
      </div>
    </header>

    <!-- Analyze Card -->
    <div class="card">
      <div class="card-title">Extract Data</div>
      <div class="card-desc">
        Paste raw waybill or invoice text — Evueo will extract and save the
        structured fields automatically.
      </div>

      <textarea
        id="messyInput"
        placeholder="E.g. Recv: Mr. James at 45 Lekki Phase 1, Lagos. Sender: Chidi Okafor. Tracking: EV-2041. Items: 3 cartons of tiles..."
      ></textarea>

      <button class="btn" onclick="analyzeData()">
        <svg
          width="15"
          height="15"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2.5"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <polyline points="22 12 18 12 15 21 9 3 6 12 2 12" />
        </svg>
        Analyze & Save
      </button>

      <div id="output">
        <div class="output-placeholder">
          Results will appear here after analysis.
        </div>
      </div>
    </div>

    <!-- Search Card -->
    <div class="card">
      <div class="card-title">Search Records</div>
      <div class="card-desc">
        Look up past entries by sender or receiver name.
      </div>

      <div class="search-row">
        <input
          type="text"
          id="searchInput"
          placeholder="e.g. Chidi or James..."
        />
        <button class="btn secondary" onclick="searchSpreadsheet()">
          <svg
            width="14"
            height="14"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.5"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <circle cx="11" cy="11" r="8" />
            <line x1="21" y1="21" x2="16.65" y2="16.65" />
          </svg>
          Search
        </button>
      </div>

      <div id="search-output" style="margin-top: 18px"></div>
    </div>

    <script>
      // ── Status Check ──
      window.onload = async function () {
        const dot = document.getElementById("status-dot");
        const text = document.getElementById("status-text");
        try {
          const res = await fetch("/api/get-records");
          if (res.ok) {
            dot.classList.add("online");
            text.textContent = "System Online";
          } else throw new Error();
        } catch {
          dot.classList.add("offline");
          text.textContent = "System Offline";
        }
      };

      // ── Spinner helper ──
      function showSpinner(containerId, label) {
        document.getElementById(containerId).innerHTML = `
        <div class="spinner-wrap">
          <div class="spinner"></div>
          <span class="spinner-label">${label}</span>
        </div>`;
      }

      // ── Format description ──
      function formatDescription(raw) {
        if (!raw) return "N/A";
        try {
          if (
            typeof raw === "string" &&
            (raw.startsWith("[") || raw.startsWith("{"))
          ) {
            const parsed = JSON.parse(raw);
            if (Array.isArray(parsed)) {
              return parsed
                .map((obj) =>
                  typeof obj === "object"
                    ? `${obj.quantity || obj.qty || ""} ${obj.unit || ""} ${obj.description || obj.name || ""}`.trim()
                    : obj,
                )
                .join(", ");
            }
          }
        } catch (_) {}
        return raw;
      }

      // ── Analyze ──
      async function analyzeData() {
        const outputDiv = document.getElementById("output");
        const text = document.getElementById("messyInput").value.trim();

        if (!text) {
          alert("Please paste some text first.");
          return;
        }

        showSpinner("output", "AI is extracting your data...");

        try {
          const res = await fetch("/api/analyze", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ text }),
          });

          const result = await res.json();

          if (res.ok) {
            const d = result.data;
            const desc = formatDescription(
              Array.isArray(d.description)
                ? JSON.stringify(d.description)
                : d.description,
            );
            const now = new Date().toLocaleString("en-GB", {
              timeZone: "Africa/Lagos",
              day: "2-digit",
              month: "short",
              year: "numeric",
              hour: "2-digit",
              minute: "2-digit",
            });

            outputDiv.innerHTML = `
            <div class="result-success">
              <div class="result-badge">✓ Saved to Google Sheets</div>
              <div class="field">
                <div class="field-label">Date</div>
                <div class="field-value">${now}</div>
              </div>
              <div class="field">
                <div class="field-label">Sender</div>
                <div class="field-value">${d.sender || "N/A"}</div>
              </div>
              <div class="field">
                <div class="field-label">Receiver</div>
                <div class="field-value">${d.receiver || "N/A"}</div>
              </div>
              <div class="field">
                <div class="field-label">Tracking Number</div>
                <div class="field-value"><span class="tracking-chip">${d.tracking_number || "N/A"}</span></div>
              </div>
              <div class="field">
                <div class="field-label">Items / Description</div>
                <div class="field-value">${desc}</div>
              </div>
            </div>`;
          } else {
            outputDiv.innerHTML = `<div class="result-error">❌ ${result.error || "Server error. Check Vercel logs."}</div>`;
          }
        } catch (err) {
          outputDiv.innerHTML = `<div class="result-error">❌ Connection error. Check your internet.</div>`;
        }
      }

      // ── Search ──
      async function searchSpreadsheet() {
        const query = document
          .getElementById("searchInput")
          .value.trim()
          .toLowerCase();
        const outDiv = document.getElementById("search-output");

        if (!query) {
          outDiv.innerHTML = "";
          return;
        }

        showSpinner("search-output", "Searching records...");

        try {
          const res = await fetch("/api/get-records");
          const all = await res.json();

          const hits = all
            .filter(
              (r) =>
                r.sender.toLowerCase().includes(query) ||
                r.receiver.toLowerCase().includes(query),
            )
            .reverse();

          if (hits.length === 0) {
            outDiv.innerHTML =
              '<div class="no-results">No records found for that name.</div>';
            return;
          }

          outDiv.innerHTML = `<div class="records-list">${hits
            .map((item) => {
              const desc = formatDescription(item.description);
              return `
              <div class="record-card">
                <div class="record-header">
                  <div class="record-route">
                    ${item.sender}<span class="arrow">→</span>${item.receiver}
                  </div>
                  <div class="record-date">${item.date}</div>
                </div>
                <div class="record-items">${desc}</div>
                <div class="record-tracking">Tracking: ${item.tracking_number}</div>
              </div>`;
            })
            .join("")}</div>`;
        } catch {
          outDiv.innerHTML = `<div class="result-error">❌ Error fetching records.</div>`;
        }
      }

      // Search on Enter key
      document.addEventListener("DOMContentLoaded", () => {
        document
          .getElementById("searchInput")
          .addEventListener("keydown", (e) => {
            if (e.key === "Enter") searchSpreadsheet();
          });
      });
    </script>
  </body>
</html>
