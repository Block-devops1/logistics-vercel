<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Evueo — Sign In</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Figtree:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      :root {
        --bg: #faf8f5;
        --surface: #fff;
        --border: #e8e2d9;
        --accent: #f97316;
        --accent2: #ea6c00;
        --text: #1c1917;
        --muted: #78716c;
        --muted2: #a8a29e;
        --error: #dc2626;
        --success: #16a34a;
      }
      body {
        background: var(--bg);
        color: var(--text);
        font-family: "Figtree", sans-serif;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        position: relative;
      }
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background-image: radial-gradient(
          circle,
          rgba(0, 0, 0, 0.045) 1px,
          transparent 1px
        );
        background-size: 24px 24px;
        pointer-events: none;
        z-index: 0;
      }
      body::after {
        content: "";
        position: fixed;
        top: -160px;
        left: 50%;
        transform: translateX(-50%);
        width: 600px;
        height: 360px;
        background: radial-gradient(
          ellipse,
          rgba(249, 115, 22, 0.1) 0%,
          transparent 70%
        );
        pointer-events: none;
        z-index: 0;
      }
      nav {
        position: relative;
        z-index: 10;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 18px 32px;
        border-bottom: 1px solid var(--border);
        background: rgba(250, 248, 245, 0.9);
        backdrop-filter: blur(10px);
      }
      .logo {
        font-family: "Syne", sans-serif;
        font-size: 1.5rem;
        font-weight: 800;
        letter-spacing: -0.5px;
        color: var(--text);
        text-decoration: none;
      }
      .logo em {
        color: var(--accent);
        font-style: normal;
      }
      .nav-signup {
        font-size: 0.88rem;
        color: var(--muted);
        text-decoration: none;
        font-weight: 500;
      }
      .nav-signup span {
        color: var(--accent);
        font-weight: 600;
      }

      main {
        position: relative;
        z-index: 1;
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 40px 20px 60px;
      }

      .login-wrap {
        width: 100%;
        max-width: 420px;
      }

      .login-header {
        text-align: center;
        margin-bottom: 28px;
        animation: fadeUp 0.4s ease both;
      }
      .login-header h1 {
        font-family: "Syne", sans-serif;
        font-size: 1.9rem;
        font-weight: 800;
        letter-spacing: -0.5px;
        margin-bottom: 8px;
      }
      .login-header p {
        font-size: 0.9rem;
        color: var(--muted);
      }

      .login-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 32px;
        box-shadow: 0 4px 28px rgba(0, 0, 0, 0.07);
        animation: fadeUp 0.45s ease 0.1s both;
      }

      .form-group {
        margin-bottom: 18px;
      }
      label {
        display: block;
        font-size: 0.82rem;
        font-weight: 600;
        color: var(--text);
        margin-bottom: 6px;
      }

      input[type="email"],
      input[type="password"] {
        width: 100%;
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 9px;
        color: var(--text);
        font-family: "Figtree", sans-serif;
        font-size: 0.92rem;
        padding: 12px 14px;
        outline: none;
        transition:
          border-color 0.2s,
          box-shadow 0.2s;
      }
      input:focus {
        border-color: rgba(249, 115, 22, 0.5);
        box-shadow: 0 0 0 3px rgba(249, 115, 22, 0.07);
      }
      input::placeholder {
        color: var(--muted2);
      }

      .forgot {
        text-align: right;
        margin-top: 6px;
      }
      .forgot a {
        font-size: 0.78rem;
        color: var(--accent);
        text-decoration: none;
        font-weight: 500;
      }
      .forgot a:hover {
        text-decoration: underline;
      }

      .alert {
        border-radius: 9px;
        padding: 12px 16px;
        margin-bottom: 18px;
        font-size: 0.85rem;
        display: none;
      }
      .alert.show {
        display: block;
        animation: fadeUp 0.3s ease;
      }
      .alert-error {
        background: rgba(220, 38, 38, 0.06);
        border: 1px solid rgba(220, 38, 38, 0.2);
        color: var(--error);
      }
      .alert-success {
        background: rgba(22, 163, 74, 0.06);
        border: 1px solid rgba(22, 163, 74, 0.2);
        color: var(--success);
      }

      .btn {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        width: 100%;
        background: var(--accent);
        color: #fff;
        font-family: "Figtree", sans-serif;
        font-weight: 700;
        font-size: 0.95rem;
        border: none;
        padding: 13px 20px;
        border-radius: 9px;
        cursor: pointer;
        transition:
          background 0.2s,
          transform 0.15s,
          box-shadow 0.2s;
        box-shadow: 0 2px 12px rgba(249, 115, 22, 0.3);
      }
      .btn:hover:not(:disabled) {
        background: var(--accent2);
        transform: translateY(-1px);
        box-shadow: 0 4px 20px rgba(249, 115, 22, 0.4);
      }
      .btn:disabled {
        opacity: 0.55;
        cursor: not-allowed;
        transform: none;
      }

      .spinner {
        width: 18px;
        height: 18px;
        border: 2px solid rgba(255, 255, 255, 0.4);
        border-top-color: #fff;
        border-radius: 50%;
        animation: spin 0.65s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .divider {
        display: flex;
        align-items: center;
        gap: 12px;
        margin: 20px 0;
      }
      .divider span {
        font-size: 0.78rem;
        color: var(--muted2);
        white-space: nowrap;
      }
      .divider::before,
      .divider::after {
        content: "";
        flex: 1;
        height: 1px;
        background: var(--border);
      }

      .signup-link {
        text-align: center;
        font-size: 0.85rem;
        color: var(--muted);
        margin-top: 20px;
      }
      .signup-link a {
        color: var(--accent);
        font-weight: 600;
        text-decoration: none;
      }
      .signup-link a:hover {
        text-decoration: underline;
      }

      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(12px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @media (max-width: 480px) {
        nav {
          padding: 14px 18px;
        }
        .login-card {
          padding: 22px 18px;
        }
      }
    </style>
  </head>
  <body>
    <nav>
      <a href="/" class="logo">ev<em>u</em>eo</a>
      <a href="/signup" class="nav-signup"
        >New here? <span>Create account</span></a
      >
    </nav>

    <main>
      <div class="login-wrap">
        <div class="login-header">
          <h1>Welcome back</h1>
          <p>Sign in to your Evueo account.</p>
        </div>

        <div class="login-card">
          <div id="alert" class="alert"></div>

          <div class="form-group">
            <label>Email address</label>
            <input type="email" id="email" placeholder="you@yourcompany.com" />
          </div>

          <div class="form-group">
            <label>Password</label>
            <input
              type="password"
              id="password"
              placeholder="Your password"
              onkeydown="if (event.key === 'Enter') signIn();"
            />
            <div class="forgot">
              <a href="/reset-password">Forgot password?</a>
            </div>
          </div>

          <button class="btn" id="signin-btn" onclick="signIn()">
            Sign In
          </button>

          <div class="divider"><span>or</span></div>

          <div style="text-align: center">
            <a
              href="/signup"
              style="
                font-size: 0.88rem;
                color: var(--accent);
                font-weight: 600;
                text-decoration: none;
              "
            >
              Create a free account →
            </a>
          </div>
        </div>

        <div class="signup-link">
          Don't have an account? <a href="/signup">Sign up free</a>
        </div>
      </div>
    </main>

    <script>
      const sb = supabase.createClient(
        "https://pyoijoamwgkyszlcgblk.supabase.co", // ← replace with your Supabase Project URL
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB5b2lqb2Ftd2dreXN6bGNnYmxrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1MTk4NTcsImV4cCI6MjA5NjA5NTg1N30.SFTZ6Ae22Ln4lzYATubf-7h_LdvZxzBPJzxINJuzcZk", // ← replace with your anon key
      );

      // Check if already logged in — redirect to app
      sb.auth.getSession().then(({ data }) => {
        if (data.session) window.location.href = "/app";
      });

      async function signIn() {
        const btn = document.getElementById("signin-btn");
        const alert = document.getElementById("alert");
        const email = document.getElementById("email").value.trim();
        const pw = document.getElementById("password").value;

        if (!email || !pw) {
          alert.className = "alert alert-error show";
          alert.textContent = "Please enter your email and password.";
          return;
        }

        btn.disabled = true;
        btn.innerHTML = `<div class="spinner"></div> Signing in…`;
        alert.className = "alert";

        const { data, error } = await sb.auth.signInWithPassword({
          email,
          password: pw,
        });

        if (error) {
          alert.className = "alert alert-error show";
          alert.textContent =
            error.message === "Invalid login credentials"
              ? "Incorrect email or password. Please try again."
              : error.message;
          btn.disabled = false;
          btn.innerHTML = "Sign In";
          return;
        }

        // Success — go to app
        window.location.href = "/app";
      }
    </script>
  </body>
</html>
